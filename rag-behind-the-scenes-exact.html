<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>What Happens Behind the Scenes?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --stage-w: 1672px;
      --stage-h: 941px;
      --scale: 1;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef0fb;
    }

    body {
      display: grid;
      place-items: center;
    }

    .slide {
      width: var(--stage-w);
      height: var(--stage-h);
      transform: scale(var(--scale));
      transform-origin: center;
      overflow: hidden;
      background: white;
      box-shadow: 0 28px 90px rgba(35, 43, 90, .2);
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-aspect-ratio: 1672 / 941) {
      :root {
        --scale: calc(100vw / 1672);
      }
    }

    @media (min-aspect-ratio: 1672 / 941) {
      :root {
        --scale: calc(100vh / 941);
      }
    }

    @media print {
      .slide {
        transform: none;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="slide" aria-label="What happens behind the scenes RAG slide">
    <img src="file:///Users/wongjunmun/Downloads/ChatGPT%20Image%20May%2031,%202026,%2011_50_06%20AM.png" alt="What happens behind the scenes RAG explainer slide" />
  </main>
</body>
</html>
