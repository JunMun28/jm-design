<!--
  TITLE TEMPLATE: divider-band   (demo source: .title-option-divider)
  Use for: process, enablement, internal updates, status reviews.
  Runtime: none — pure CSS. Strongest when the title is direct and operational.
  Read ./README.md for the shared cover contract.
-->

<!-- 1. SECTION (slide 1). The band is a direct child so it lands inside .slide-stage. -->
<section class="slide title-slide title-divider" data-slide-kind="cover">
  <div class="md-divider-band" aria-hidden="true"></div>
  <img class="md-title-brand" src="assets/micron-logo-white-tm-rgb.png" alt="Micron" />
  <div class="md-title-content">
    <p class="kicker reveal">[EYEBROW]</p>
    <h1 class="reveal">[TITLE]</h1>
    <p class="subtitle reveal">[SUBTITLE]</p>
    <div class="md-accent-line reveal"></div>
  </div>
  <div class="md-title-note">[CONTEXT — audience · date · source]</div>
  <div class="md-title-number">01 / Cover</div>
</section>

<!-- 2. STYLE (paste once into deck <style>). -->
<style>
  .title-divider .slide-stage{ background:#071b2c; }
  .title-divider .md-divider-band{
    position:absolute;right:-180px;bottom:-230px;
    width:720px;height:420px;
    transform:rotate(-18deg);
    background:linear-gradient(135deg, #2044ff 0%, #BD03F7 54%, #FF8CFF 100%);
    border-radius:28px;opacity:.9;z-index:1;
  }
  .title-divider .md-title-content{ max-width:900px; }
  .title-divider .md-title-content h1{ max-width:780px;color:#e6f0ff; }
  .title-divider .md-title-content .subtitle{ max-width:780px;color:#d7e4f5; }
  .title-divider .md-title-note{ color:rgba(255,255,255,.46); }
  .title-divider .md-title-brand,
  .title-divider .md-title-content,
  .title-divider .md-title-note,
  .title-divider .md-title-number{ z-index:4; }
</style>

<!-- 3. SCRIPT: none. -->
