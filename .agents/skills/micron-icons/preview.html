<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Micron Icons Preview</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f7f7f8; color: #111; }
    header { position: sticky; top: 0; z-index: 2; padding: 16px 20px; background: rgba(255,255,255,.94); border-bottom: 1px solid #ddd; backdrop-filter: blur(12px); }
    h1 { margin: 0 0 12px; font-size: 22px; }
    .filters { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 10px; }
    input, select { min-width: 0; padding: 9px 10px; border: 1px solid #bbb; border-radius: 6px; background: white; color: #111; }
    main { padding: 20px; }
    .meta { margin: 0 0 14px; color: #555; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 12px; display: grid; gap: 10px; }
    .thumb { height: 140px; display: grid; place-items: center; background: linear-gradient(135deg, #fafafa, #ececf1); border-radius: 6px; overflow: hidden; }
    .thumb.rev { background: #050505; }
    img, video { max-width: 110px; max-height: 110px; object-fit: contain; }
    .name { font-weight: 700; }
    .details { font-size: 12px; color: #555; line-height: 1.45; }
    code { display: block; overflow: auto; padding: 7px; background: #f3f3f5; border-radius: 5px; font-size: 11px; white-space: nowrap; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #f6f6f6; }
      header, .card { background: #1b1b1d; border-color: #333; }
      input, select { background: #111; color: #f6f6f6; border-color: #444; }
      .meta, .details { color: #aaa; }
      code { background: #111; color: #ddd; }
      .thumb { background: #f1f1f1; }
      .thumb.rev { background: #050505; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Micron Icons Preview</h1>
    <div class="filters">
      <input id="q" type="search" placeholder="Search tags, labels, filenames">
      <select id="set"><option value="">Any set</option></select>
      <select id="category"><option value="">Any category</option></select>
      <select id="style"><option value="">Any style</option></select>
      <select id="media"><option value="">Any media</option></select>
    </div>
  </header>
  <main>
    <p class="meta" id="meta">Loading manifest...</p>
    <div class="grid" id="grid"></div>
  </main>
  <script>
    const state = { manifest: null, icons: [] };
    const els = {
      q: document.querySelector("#q"),
      set: document.querySelector("#set"),
      category: document.querySelector("#category"),
      style: document.querySelector("#style"),
      media: document.querySelector("#media"),
      meta: document.querySelector("#meta"),
      grid: document.querySelector("#grid")
    };

    function option(select, value) {
      const opt = document.createElement("option");
      opt.value = value;
      opt.textContent = value;
      select.appendChild(opt);
    }

    function fillFilters() {
      for (const key of ["set", "category", "style", "media"]) {
        const values = [...new Set(state.icons.map(icon => icon[key]))].sort();
        values.forEach(value => option(els[key], value));
      }
    }

    function semanticSnippet(icon) {
      if (icon.media === "mp4") return `<video src="${icon.path}" muted autoplay loop playsinline aria-label="${icon.alt}"></video>`;
      return `<img src="${icon.path}" alt="${icon.alt}">`;
    }

    function decorativeSnippet(icon) {
      if (icon.media === "mp4") return `<video src="${icon.path}" muted autoplay loop playsinline aria-hidden="true"></video>`;
      return `<img src="${icon.path}" alt="" aria-hidden="true">`;
    }

    function matches(icon) {
      const text = [
        icon.id, icon.base_id, icon.label, icon.category, icon.canonical_slug,
        icon.source_slug, icon.original_filename, ...(icon.aliases || [])
      ].join(" ").toLowerCase();
      const q = els.q.value.trim().toLowerCase();
      return (!q || text.includes(q))
        && (!els.set.value || icon.set === els.set.value)
        && (!els.category.value || icon.category === els.category.value)
        && (!els.style.value || icon.style === els.style.value)
        && (!els.media.value || icon.media === els.media.value);
    }

    function render() {
      const icons = state.icons.filter(matches);
      els.meta.textContent = `${icons.length} of ${state.icons.length} icons shown. Schema v${state.manifest.schema_version}; generated ${state.manifest.generated_at}.`;
      els.grid.innerHTML = "";
      for (const icon of icons) {
        const card = document.createElement("article");
        card.className = "card";
        const media = icon.media === "mp4"
          ? `<video src="${icon.path}" muted autoplay loop playsinline></video>`
          : `<img src="${icon.path}" alt="${icon.alt}">`;
        card.innerHTML = `
          <div class="thumb ${icon.style}">${media}</div>
          <div>
            <div class="name">${icon.label}</div>
            <div class="details">${icon.base_id}<br>${icon.category} · ${icon.style} · ${icon.media}<br>${icon.original_filename}</div>
          </div>
          <code>${icon.path}</code>
          <code>${semanticSnippet(icon).replaceAll("<", "&lt;").replaceAll(">", "&gt;")}</code>
          <code>${decorativeSnippet(icon).replaceAll("<", "&lt;").replaceAll(">", "&gt;")}</code>
        `;
        els.grid.appendChild(card);
      }
    }

    fetch("assets/manifest.json")
      .then(response => response.json())
      .then(manifest => {
        state.manifest = manifest;
        state.icons = manifest.icons || [];
        fillFilters();
        render();
      })
      .catch(error => {
        els.meta.textContent = `Failed to load assets/manifest.json: ${error.message}`;
      });

    for (const el of [els.q, els.set, els.category, els.style, els.media]) {
      el.addEventListener("input", render);
    }
  </script>
</body>
</html>
